name: Deploy Agent Memory Learn

on:
  workflow_dispatch:
  push:
    paths:
      - "docs/**"
      - "sites/agent-memory-learn/**"
      - ".github/workflows/agent-memory-learn-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: agent-memory-learn-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Build Site
        working-directory: sites/agent-memory-learn
        run: node scripts/build.mjs

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: sites/agent-memory-learn/dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
